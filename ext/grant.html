<!doctype html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<title>Daimond Hands</title>
	<style>
		:root { color-scheme: light dark; }
		body {
			font:		15px/1.5 system-ui, sans-serif;
			margin:		0;
			padding:	22px;
			background:	Canvas;
			color:		CanvasText;
		}
		h1 { font-size: 17px; margin: 0 0 14px; }
		.host {
			font:		600 20px/1.3 ui-monospace, monospace;
			padding:	10px 12px;
			border:		1px solid color-mix(in srgb, CanvasText 22%, transparent);
			border-radius:	8px;
			margin:		0 0 14px;
			word-break:	break-all;
		}
		p { margin: 0 0 12px; }
		.fine { opacity: .72; font-size: 13px; }
		.row { display: flex; gap: 10px; margin-top: 18px; }
		button {
			flex:		1;
			padding:	10px 14px;
			font:		inherit;
			font-weight:	600;
			border-radius:	8px;
			border:		1px solid color-mix(in srgb, CanvasText 25%, transparent);
			background:	transparent;
			color:		inherit;
			cursor:		pointer;
		}
		button.allow {
			background:	#2f6fed;
			border-color:	#2f6fed;
			color:		#fff;
		}
	</style>
</head>
<body>
	<h1 id="head">…</h1>
	<div class="host" id="host" hidden></div>
	<p id="body"></p>
	<p class="fine" id="fine"></p>
	<div class="row">
		<button id="deny">Not now</button>
		<button id="allow" class="allow">Allow</button>
	</div>
	<script src="grant.js"></script>
</body>
</html>
